<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Web Audio Example</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #permission-btn {
            background: #007bff;
            color: white;
        }
        #start-btn {
            background: #28a745;
            color: white;
        }
        #stop-btn {
            background: #dc3545;
            color: white;
        }
        .warning {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <h1>Web Audio Feedback Example</h1>

    <div class="warning">
        <strong>Warning:</strong> This creates a feedback loop! Use headphones or keep volume low to avoid loud noise.
    </div>

    <div class="section">
        <h3>1. Request Permission</h3>
        <p>Click to allow microphone access:</p>
        <button id="permission-btn" onclick="request_permission()">Request Microphone Permission</button>
    </div>

    <div class="section">
        <h3>2. Select Devices</h3>
        <label for="input-device">Input (Microphone):</label>
        <select id="input-device">
            <option value="">-- Request permission first --</option>
        </select>

        <label for="output-device">Output (Speakers):</label>
        <select id="output-device">
            <option value="">-- Request permission first --</option>
        </select>
    </div>

    <div class="section">
        <h3>3. Start/Stop Audio</h3>
        <button id="start-btn" onclick="start_audio()">Start Audio</button>
        <button id="stop-btn" onclick="stop_audio()" disabled>Stop Audio</button>
    </div>

    <script type="module">
        import init, { request_permission, start_audio, stop_audio } from './pkg/web_audio_example.js';

        async function run() {
            await init();

            // Expose functions to window for onclick handlers
            window.request_permission = request_permission;
            window.start_audio = start_audio;
            window.stop_audio = stop_audio;
        }

        run();
    </script>
</body>
</html>
